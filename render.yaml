services:
  - type: web
    name: barangay-clearance-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    branch: main
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY_MS
        value: "900000"
      - key: JWT_REFRESH_EXPIRY_MS
        value: "604800000"
      - key: PAYMENT_STUB_ALWAYS_SUCCESS
        value: "true"
